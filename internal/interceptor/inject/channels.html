    window.__wx_fake_asset_version__ =
      new URLSearchParams(window.location.search).get("asset_v") || "";
    function __wx_fake_asset_url(path) {
      var url = window.__wx_channels_assets_base__.replace(/\/$/, "") + path;
      if (window.__wx_fake_asset_version__) {
        url += (url.indexOf("?") === -1 ? "?" : "&") +
          "v=" + encodeURIComponent(window.__wx_fake_asset_version__);
      }
      return url;
    }
    document.write(
      '<link rel="stylesheet" href="' +
      __wx_fake_asset_url("/lib/timeless/0.28.0/timeless.weui.css") +

  <style>
    :root {
      color-scheme: dark;
      --fake-bg: #15171b;
      --fake-panel: #20242b;
      --fake-panel-2: #292f38;
      --fake-text: rgba(255, 255, 255, 0.88);
      --fake-muted: rgba(255, 255, 255, 0.56);
      --fake-line: rgba(255, 255, 255, 0.12);
      --fake-green: #07c160;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 140vh;
      background:
        radial-gradient(circle at 18% 12%, rgba(7, 193, 96, 0.12), transparent 30%),
        var(--fake-bg);
      color: var(--fake-text);
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .page {
      min-height: 100vh;
      padding: 32px;
    }

    .home-header {
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      margin-bottom: 16px;
      padding: 0 18px;
      border: 1px solid var(--fake-line);
      border-radius: 8px;
      background: rgba(32, 36, 43, 0.96);
    }

    .home-header-main {
      display: flex;
      align-items: center;
      gap: 14px;
      min-width: 0;
    }

    .home-header-logo {
      width: 28px;
      height: 28px;
      border-radius: 6px;
      background: var(--fake-green);
    }

    .home-header-title {
      font-size: 15px;
      font-weight: 650;
    }

    .home-header-subtitle {
      color: var(--fake-muted);
      font-size: 12px;
    }

    .home-header-actions,
    .home-header-action-wrap {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 12px;
    }

    .home-header-action-wrap {
      min-width: 128px;
      min-height: 32px;
    }

    .home-header-placeholder {
      width: 24px;
      height: 24px;
      border: 1px solid var(--fake-line);
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.06);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      margin-bottom: 16px;
    }

    .toolbar button,
    .probe-trigger {
      min-height: 32px;
      border: 1px solid var(--fake-line);
      border-radius: 6px;
      background: var(--fake-panel-2);
      color: var(--fake-text);
      padding: 0 10px;
      cursor: pointer;
    }

    .toolbar button:hover,
    .probe-trigger:hover {
      background: #333b47;
    }

    .workspace {
      display: block;
    }

    .fake-stage {
      min-height: 720px;
      border: 1px solid var(--fake-line);
      border-radius: 8px;
      background: linear-gradient(180deg, #1d2229, #171a1f);
      overflow: hidden;
      position: relative;
    }

    .with-transform .fake-stage {
      transform: translate3d(38px, 24px, 0) scale(0.94);
      transform-origin: top left;
    }

    .slides-scroll {
      width: 100%;
      height: 720px;
      overflow: auto;
      padding: 56px 70px 140px;
    }

    .slides-item {
      width: min(720px, 100%);
      min-height: 560px;
      margin: 0 auto;
      position: relative;
    }

    .feed-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 76px;
      gap: 18px;
      align-items: end;
    }

    .video-card {
      min-height: 560px;
      border-radius: 8px;
      overflow: hidden;
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.08), transparent 38%),
        linear-gradient(135deg, #394150, #12151a 62%);
      border: 1px solid rgba(255, 255, 255, 0.1);
      position: relative;
    }

    .video-card::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        linear-gradient(transparent 55%, rgba(0, 0, 0, 0.58)),
        repeating-linear-gradient(135deg,
          rgba(255, 255, 255, 0.04) 0,
          rgba(255, 255, 255, 0.04) 1px,
          transparent 1px,
          transparent 14px);
    }

    .feed-copy {
      position: absolute;
      left: 24px;
      right: 24px;
      bottom: 24px;
      z-index: 1;
    }

    .feed-title {
      margin: 0 0 8px;
      font-size: 18px;
      font-weight: 650;
    }

    .feed-desc {
      margin: 0;
      color: var(--fake-muted);
      font-size: 13px;
      line-height: 1.6;
    }

    .op-list {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      padding-bottom: 20px;
    }

    .click-box.op-item {
      width: 58px;
      min-height: 58px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 5px;
      border-radius: 8px;
      color: rgba(255, 255, 255, 0.9);
      cursor: pointer;
      user-select: none;
    }

    .click-box.op-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .op-icon {
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .op-text {
      font-size: 12px;
      line-height: 1;
    }

    .debug-panel {
      position: sticky;
      top: 16px;
      border: 1px solid var(--fake-line);
      border-radius: 8px;
      background: rgba(32, 36, 43, 0.96);
      overflow: hidden;
    }

    .debug-panel header {
      padding: 12px 14px;
      border-bottom: 1px solid var(--fake-line);
      font-weight: 650;
    }

    .debug-panel pre {
      margin: 0;
      padding: 12px 14px 16px;
      max-height: 620px;
      overflow: auto;
      color: rgba(255, 255, 255, 0.74);
      font-size: 12px;
      line-height: 1.55;
      white-space: pre-wrap;
    }

    .probe-area {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      min-height: 48px;
      padding: 0 70px 18px;
    }

    .debug-box {
      position: fixed;
      z-index: 2147483646;
      pointer-events: none;
      border: 2px solid currentColor;
    }

    .debug-box span {
      position: absolute;
      left: 0;
      top: -20px;
      padding: 2px 5px;
      border-radius: 4px;
      background: currentColor;
      color: #111;
      font-size: 11px;
      line-height: 1;
      white-space: nowrap;
    }

    @media (max-width: 980px) {
      .workspace {
        grid-template-columns: 1fr;
      }

      .debug-panel {
        position: static;
      }
    }
  </style>
</head>

      function feedDownloadTrigger() {
        const icon = document.querySelector(".download-icon");
        return icon
          ? icon.closest("[data-dropdown-menu-impl]") ||
          icon.closest(".click-box.op-item") ||
          icon
          : null;
      }

      function downloaderPanelTrigger() {
        return (
          document.querySelector(".home-header [data-v-81be080d]") ||
          document.querySelector(".home-header .mr-2.relative")
        );
      }

      function rectOf(el) {
        if (!el) return null;
        const r = el.getBoundingClientRect();
        return {
          x: Math.round(r.x),
          y: Math.round(r.y),
          top: Math.round(r.top),
          left: Math.round(r.left),
          right: Math.round(r.right),
          bottom: Math.round(r.bottom),
          width: Math.round(r.width),
          height: Math.round(r.height),
        };
      }

      function isVisible(el) {
        if (!el) return false;
        const style = getComputedStyle(el);
        const rect = el.getBoundingClientRect();
        return (
          style.display !== "none" &&
          style.visibility !== "hidden" &&
          rect.width > 0 &&
          rect.height > 0
        );
      }

      function visibleMenus() {
        return Array.from(
          document.querySelectorAll(".t1-popper"),
        )
          .filter(isVisible)
          .map((el, index) => ({
            index,
            className: el.className,
            rect: rectOf(el),
            transform: getComputedStyle(el).transform,
          }));
      }

      function ensureDebugBox(id, color, label) {
        let box = document.getElementById(id);
        if (!box) {
          box = document.createElement("div");
          box.id = id;
          box.className = "debug-box";
          box.style.color = color;
          box.innerHTML = `<span>${label}</span>`;
          document.body.appendChild(box);
        }
        return box;
      }

      function placeDebugBox(id, rect, color, label) {
        const box = ensureDebugBox(id, color, label);
        if (!rect) {
          box.style.display = "none";
          return;
        }
        box.style.display = "block";
        box.style.left = rect.left + "px";
        box.style.top = rect.top + "px";
        box.style.width = rect.width + "px";
        box.style.height = rect.height + "px";
      }

      function snapshot() {
        const trigger = feedDownloadTrigger();
        const menus = visibleMenus();
        const probe = document.getElementById("timeless-probe-trigger");
        const probeMount = document.getElementById("timeless-probe");
        const data = {
          viewport: {
            width: window.innerWidth,
            height: window.innerHeight,
            scrollX: Math.round(window.scrollX),
            scrollY: Math.round(window.scrollY),
            devicePixelRatio: window.devicePixelRatio,
          },
          appTransform: getComputedStyle(document.getElementById("app"))
            .transform,
          feedTrigger: rectOf(trigger),
          feedTriggerDropdownImpl:
            (trigger && trigger.dataset && trigger.dataset.dropdownMenuImpl) ||
            null,
          downloaderPanelTrigger: rectOf(downloaderPanelTrigger()),
          timelessProbeTrigger: rectOf(probe),
          timelessProbeImpl:
            (probeMount && probeMount.dataset.dropdownMenuImpl) || null,
          menus,
        };
        placeDebugBox("debug-feed-trigger", data.feedTrigger, "#07c160", "feed trigger");
        placeDebugBox(
          "debug-downloader-trigger",
          data.downloaderPanelTrigger,
          "#a78bfa",
          "downloader trigger",
        );
        placeDebugBox(
          "debug-timeless-trigger",
          data.timelessProbeTrigger,
          "#4da3ff",
          "timeless trigger",
        );
        menus.slice(0, 2).forEach((menu, index) => {
          placeDebugBox(
            "debug-menu-" + index,
            menu.rect,
            index === 0 ? "#ffcc00" : "#ff6b6b",
            "menu " + index,
          );
        });
        document.getElementById("rect-output").textContent = JSON.stringify(
          data,
          null,
          2,
        );
        return data;
      }

      function installFakeData() {
        if (!window.WXU || !window.WXE) return;
        WXU.set_feed(fakeFeed);
        // const originalCreate = WXU.downloader.create;
        // WXU.downloader.create = async function (feed, opt) {

        //   return originalCreate.call(this, feed, opt);
        // };
        WXE.emit(WXE.Events.FeedProfileLoaded, fakeFeed);
        WXE.emit(WXE.Events.Feed, fakeFeed);

        //     setTimeout(snapshot, 50);

        //     window.__wx_insert_download_btn_to_feed_profile_page();
        //   }
        //   setTimeout(snapshot, 50);
        // };
        // document.getElementById("log-rects").onclick = function () {

        // };

      document.addEventListener("DOMContentLoaded", function () {
        setTimeout(function () {
          // installFakeData();
          // renderTimelessProbe();
          // bindControls();
          // snapshot();
          // setInterval(snapshot, 300);
        }, 60);

        var input = document.getElementById("create-task-input");
        var btn = document.getElementById("create-task-btn");
        var creating = false;
        btn.addEventListener("click", async function () {
          if (creating) return;
          var text = (input.value || "").trim();
          if (!text) {
            alert("请输入下载地址");
            return;
          }
          creating = true;
          btn.querySelector(".op-text").textContent = "创建中...";
          try {
            var resp = await fetch(WXEnv.downloadOrigin + "/api/task/create3", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ text: text }),
            });
            var r = await resp.json();
            if (r.code !== 0) {
              alert(r.msg || "创建任务失败");
              return;
            }
            var data = r.data || {};
            var ids = Array.isArray(data.ids) ? data.ids : [];
            var skipped = Array.isArray(data.skipped) ? data.skipped : [];
            var failed = Array.isArray(data.failed) ? data.failed : [];
            if (ids.length > 0) {
              // alert("已创建 " + ids.length + " 个下载任务");
            } else if (skipped.length > 0 && failed.length === 0) {
              alert("没有新的下载任务");
            } else if (failed.length > 0) {
              alert(failed[0].message || "创建任务失败");
              return;
            }
            input.value = "";
            WXU.downloader.show();
          } catch (err) {
            alert("请求失败: " + (err.message || err));
          } finally {
            creating = false;
            btn.querySelector(".op-text").textContent = "下载";
          }
        });
