    :root {

      --text: #17211d;
      --muted: #6a7972;
      --green: #07c160;
      --blue: #2f7dd1;
      --amber: #b56b10;
      --card-bg: #e6ece9;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--page-bg);
      color: var(--text);
      font-family:
        -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    .preview-page {
      height: 100vh;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr);
    }

    .preview-toolbar {
      min-height: 72px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.94);
    }

    .preview-heading {
      min-width: 0;
    }

    .preview-heading h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.3;
      font-weight: 680;
      letter-spacing: 0;
    }

    .preview-meta {
      margin-top: 4px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .preview-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-shrink: 0;
    }

    .preview-stat {
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding: 0 11px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f8faf9;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .preview-stat::before {
      content: "";
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--green);
    }

    .preview-button {
      min-height: 34px;
      border: 1px solid #b8c6bf;
      border-radius: 6px;
      background: #ffffff;
      color: var(--text);
      padding: 0 12px;
      font: inherit;
      font-size: 13px;
      cursor: pointer;
    }

    .preview-button:hover {
      border-color: var(--green);
      color: #046d38;
    }

    .preview-main {
      min-height: 0;
      padding: 0;
    }

    #gallery {
      width: 100%;
      height: 100%;
      min-height: 0;
    }

    .preview-waterfall-scroll {
      width: 100%;
      height: 100%;
      min-height: 0;
      overflow: auto;
      padding: 18px;
      background-color: transparent;
      scrollbar-gutter: stable;
    }

    .preview-columns {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      align-items: start;
      gap: 14px;
      width: 100%;
      min-height: 100%;
    }

    .preview-column-list {
      min-width: 0;
      outline: none;
    }

    .preview-card {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
      border: 1px solid rgba(23, 33, 29, 0.12);
      border-radius: 8px;
      background: var(--card-bg);
      box-shadow: 0 7px 18px rgba(23, 33, 29, 0.08);
      contain: layout paint;
    }

    .preview-card img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      background: var(--card-bg);
    }

    .preview-card-caption {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 32px;
      display: flex;
      align-items: flex-end;
      padding: 18px 9px 8px;
      color: #ffffff;
      background: linear-gradient(180deg, transparent, rgba(0, 0, 0, 0.68));
      font-size: 11px;
      line-height: 1.25;
      opacity: 0;
      transition: opacity 150ms ease;
      pointer-events: none;
    }

    .preview-card:hover .preview-card-caption {
      opacity: 1;
    }

    .preview-card-caption span {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
      overflow-wrap: anywhere;
    }

    .preview-card.is-error {
      border-color: rgba(181, 107, 16, 0.38);
      background:
        repeating-linear-gradient(
          135deg,
          rgba(181, 107, 16, 0.16) 0,
          rgba(181, 107, 16, 0.16) 8px,
          rgba(255, 255, 255, 0.58) 8px,
          rgba(255, 255, 255, 0.58) 16px
        ),
        var(--card-bg);
    }

    .preview-error-label {
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 14px;
      color: #7a4306;
      font-size: 12px;
      text-align: center;
    }

    .preview-empty {
      height: 100%;
      min-height: 360px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .preview-toolbar {
        align-items: flex-start;
        flex-direction: column;
        gap: 10px;
        padding: 12px 14px;
      }

      .preview-actions {
        width: 100%;
        justify-content: space-between;
      }

      .preview-stat {
        min-width: 0;
        flex: 1;
      }
    }
  </style>

        const data = payload.data || {};
        const images = Array.isArray(data.images) ? data.images : [];
        const items = images.map(apiImageToItem);
        setGalleryItems(items, data.path || path);
      }

      function estimateRatio(index) {
        return ratioSeeds[index % ratioSeeds.length];
      }

      function mountedElement(event) {
        let target = event && event.target ? event.target : event;
        for (let depth = 0; depth < 4; depth += 1) {
          if (
            target &&
            typeof target.appendChild === "function" &&
            typeof target.setAttribute === "function"
          ) {
            return target;
          }
          if (target && typeof target.get$elm === "function") {
            target = target.get$elm();
            continue;
          }
          if (target && target.$elm) {
            target = target.$elm;
            continue;
          }
          break;
        }
        return null;
      }

      function getAvailableWidth() {
        const fallback = Math.max(320, window.innerWidth || 1024);
        const width = scrollRoot && scrollRoot.clientWidth ? scrollRoot.clientWidth : fallback;
        return Math.max(280, width - 36);
      }

      function itemRatio(item) {
        if (item.naturalWidth > 0 && item.naturalHeight > 0) {
          return item.naturalHeight / item.naturalWidth;
        }
        return item.ratio || 1.35;
      }

      function shortestColumn(heights) {
        let index = 0;
        let value = heights[0] || 0;
        for (let i = 1; i < heights.length; i += 1) {
          if (heights[i] < value) {
            index = i;
            value = heights[i];
          }
        }
        return index;
      }

      function buildLayout() {
        const width = getAvailableWidth();
        const columns = COLUMN_COUNT;
        const gutter = COLUMN_GAP;
        const columnWidth = Math.floor((width - gutter * (columns - 1)) / columns);
        const heights = Array(columns).fill(0);
        const nextColumns = Array.from({ length: columns }, () => []);
        galleryItems.forEach((item) => {
          const column = shortestColumn(heights);
          const height = Math.max(96, Math.round(columnWidth * itemRatio(item)));
          nextColumns[column].push({
            id: item.id,
            item,
            height,
          });
          heights[column] += height + gutter;
        });
        const totalHeight = Math.max(
          0,
          ...heights.map((height) => Math.max(0, height - gutter)),
        );
        if (columnGutter$.value !== gutter) {
          columnGutter$.as(gutter);
        }

        lastLayout = {
          columns,
          totalHeight,
        };
        columnItems$.forEach((columnItems, index) => {
          columnItems.as(nextColumns[index]);
        });
        syncStats();
      }

      function scheduleLayout() {
        if (layoutFrame) {
          return;
        }
        layoutFrame = requestAnimationFrame(() => {
          layoutFrame = 0;
          buildLayout();
        });
      }

      function syncScrollMetrics() {
        if (!scrollRoot) {
          return;
        }
        const nextScrollTop = scrollRoot.scrollTop || 0;
        const nextViewportHeight = scrollRoot.clientHeight || window.innerHeight || 900;
        if (Math.abs(scrollTop$.value - nextScrollTop) > 0.5) {
          scrollTop$.as(nextScrollTop);
        }
        if (Math.abs(viewportHeight$.value - nextViewportHeight) > 0.5) {
          viewportHeight$.as(nextViewportHeight);
        }
        syncStats();
      }

      function scheduleScrollMetrics() {
        if (scrollFrame) {
          return;
        }
        scrollFrame = requestAnimationFrame(() => {
          scrollFrame = 0;
          syncScrollMetrics();
        });
      }

      function loadedCount() {
        return galleryItems.filter((item) => item.loaded).length;
      }

      function failedCount() {
        return galleryItems.filter((item) => item.failed).length;
      }

      function renderedCount() {
        return columnRoots.reduce((count, root) => {
          if (!root) {
            return count;
          }
          return count + (Number(root.getAttribute("data-virtual-list-rendered")) || 0);
        }, 0);
      }

      function totalColumnItems() {
        return columnItems$.reduce((count, columnItems) => count + columnItems.value.length, 0);
      }

      function syncStats() {
        const suffix = failedCount() > 0 ? ", " + failedCount() + " failed" : "";
        statEl.textContent =
          galleryItems.length +
          " images, " +
          lastLayout.columns +
          " columns, " +
          renderedCount() +
          "/" +
          totalColumnItems() +
          " rendered" +
          suffix +
          ", " +
          loadedCount() +
          " loaded";
      }

      function updateImageMetrics(item, img, card, silent = false) {
        if (!img.naturalWidth || !img.naturalHeight) {
          return;
        }
        const hadKnownLayoutDimensions = item.layoutDimensionsKnown;
        const changed =
          item.naturalWidth !== img.naturalWidth ||
          item.naturalHeight !== img.naturalHeight ||
          item.failed;
        item.naturalWidth = img.naturalWidth;
        item.naturalHeight = img.naturalHeight;
        item.ratio = img.naturalHeight / img.naturalWidth;
        item.layoutDimensionsKnown = true;
        item.loaded = true;
        item.failed = false;
        if (card) {
          card.classList.remove("is-error");
        }
        if (changed && !hadKnownLayoutDimensions && !silent) {
          scheduleLayout();
        } else if (!silent) {
          syncStats();
        }
      }

      function markImageError(item, card) {
        if (!item.failed) {
          item.failed = true;
          syncStats();
        }
        if (!card || card.querySelector(".preview-error-label")) {
          return;
        }
        card.classList.add("is-error");
        const label = document.createElement("div");
        label.className = "preview-error-label";
        label.textContent = item.name;
        card.appendChild(label);
      }

      function bindImageElement(img, item) {
        if (!img || img.dataset.previewImageBound === "1") {
          return;
        }
        img.dataset.previewImageBound = "1";
        const card = img.closest ? img.closest(".preview-card") : null;
        img.onload = () => updateImageMetrics(item, img, card);
        img.onerror = () => markImageError(item, card);
        if (img.complete) {
          if (img.naturalWidth > 0 && img.naturalHeight > 0) {
            updateImageMetrics(item, img, card);
          } else {
            markImageError(item, card);
          }
        }
      }

      function ImageTile(entry) {
        const item = entry.item;
        return View(
          {
            class: "preview-card",
            attributes: {
              title: item.name,
              "data-image-id": item.id,
            },
            style: {
              height: entry.height + "px",
            },
            onMounted(event) {
              const card = mountedElement(event);
              const img = card ? card.querySelector("img") : null;
              if (img) {
                bindImageElement(img, item);
              }
            },
          },
          [
            Timeless.Img({
              src: item.src,
              attributes: {
                alt: item.name,
                title: item.name,
                loading: "eager",
                decoding: "async",
                draggable: "false",
              },
              onMounted(event) {
                const img = mountedElement(event);
                bindImageElement(img, item);
              },
            }),
            View({ class: "preview-card-caption" }, [
              View({}, [item.name]),
            ]),
          ],
        );
      }

      function ColumnList(index) {
        return VirtualListView({
          class: "preview-column-list",
          style: {
            position: "relative",
            overflow: "visible",
            "background-color": "transparent",
          },
          key: "id",
          size: 8,
          buffer: 8,
          gutter: columnGutter$,
          itemHeight(entry) {
            return entry && entry.height ? entry.height : 180;
          },
          externalScroll: true,
          scrollTop: scrollTop$,
          viewportHeight: viewportHeight$,
          each: columnItems$[index],
          onMounted(event) {
            columnRoots[index] = mountedElement(event);
            syncStats();
          },
          onUnmounted() {
            columnRoots[index] = null;
          },
          onScrollTopAdjust(delta) {
            if (scrollRoot) {
              scrollRoot.scrollTop = Math.max(0, scrollRoot.scrollTop + delta);
              syncScrollMetrics();
            }
          },
          onItemResize() {
            syncStats();
          },
          render(entry) {
            return ImageTile(entry);
          },
        });
      }

      function renderGallery() {
        Timeless.DOM.render(
          View(
            {
              class: "preview-waterfall-scroll wx-dl-dark-scroll",
              onMounted(event) {
                scrollRoot = mountedElement(event);
                if (scrollRoot) {
                  scrollRoot.addEventListener("scroll", scheduleScrollMetrics, { passive: true });
                }
                syncScrollMetrics();
                scheduleLayout();
              },
              onUnmounted() {
                if (scrollRoot) {
                  scrollRoot.removeEventListener("scroll", scheduleScrollMetrics);
                }
                scrollRoot = null;
              },
            },
            [
              View(
                { class: "preview-columns" },
                Array.from({ length: COLUMN_COUNT }, (_, index) => ColumnList(index)),
              ),
            ],
          ),
          galleryEl,
        );
      }

      function revokeObjectURLs() {
        while (objectURLs.length) {
          URL.revokeObjectURL(objectURLs.pop());
        }
      }

      function fileToItem(file, index) {
        const src = URL.createObjectURL(file);
        objectURLs.push(src);
        return {
          id: "picked-" + file.name + "-" + file.size + "-" + file.lastModified,
          name: file.webkitRelativePath || file.name,
          src,
          ratio: estimateRatio(index),
          naturalWidth: 0,
          naturalHeight: 0,
          loaded: false,
          failed: false,
        };
      }

      async function setPickedFiles(files) {
        const images = Array.from(files || [])
          .filter((file) => /^image\//.test(file.type))
          .sort((a, b) => a.name.localeCompare(b.name, undefined, { numeric: true }))
          .map(fileToItem);
        if (!images.length) {
          return;
        }
        setGalleryItems(images, "Selected local folder");
      }

      async function pickDirectory() {
        if (window.showDirectoryPicker) {
          const handle = await window.showDirectoryPicker();
          const files = [];
          for await (const entry of handle.values()) {
            if (entry.kind !== "file") {
              continue;
            }
            const file = await entry.getFile();
            if (/^image\//.test(file.type)) {
              files.push(file);
            }
          }
          revokeObjectURLs();
          await setPickedFiles(files);
          return;
        }
        directoryInput.click();
      }

      pickButton.addEventListener("click", () => {
        pickDirectory().catch((error) => {
          if (error && error.name === "AbortError") {
            return;
          }
          console.error("[preview] choose folder failed", error);
        });
      });

      directoryInput.addEventListener("change", () => {
        revokeObjectURLs();
        setPickedFiles(directoryInput.files).catch((error) => {
          console.error("[preview] load selected folder failed", error);
        });
        directoryInput.value = "";
      });

      window.addEventListener("resize", () => {
        syncScrollMetrics();
        scheduleLayout();
      });
      renderGallery();
      loadDirectory(initialDirectory).catch((error) => {
        console.error("[preview] load directory failed", error);
        setGalleryItems(buildDefaultItems(), IMAGE_DIRECTORY);
      });
    })();
  </script>
</body>

</html>
